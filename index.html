<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pilotes – Autocross Saint Georges de Montaigu</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0c0f28;--navy-2:#12163a;--navy-3:#181d4a;
  --border:#252952;--border-soft:#1e2245;
  --pink:#e72681;--pink-soft:rgba(231,38,129,.14);--pink-line:rgba(231,38,129,.35);
  --blue:#0087cc;--blue-soft:rgba(0,135,204,.14);--blue-line:rgba(0,135,204,.35);
  --white:#f0f2fb;--gray:#7a82b0;--silver:#a8b6d0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--navy);font-family:'Outfit',system-ui,sans-serif;color:var(--white);min-height:100vh;overflow-x:hidden;}

/* HEADER */
.header{
  padding:18px 16px 14px;
  background:linear-gradient(180deg,rgba(231,38,129,.07),transparent);
  border-bottom:1px solid var(--border);
}
.head-row{display:flex;align-items:center;gap:12px;}
.logo{height:46px;filter:drop-shadow(0 2px 8px rgba(231,38,129,.25));}
.eyebrow{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);font-weight:700;margin-bottom:3px;}
h1{font-family:'Anton',sans-serif;font-size:22px;font-weight:400;letter-spacing:.03em;text-transform:uppercase;line-height:1;
  background:linear-gradient(90deg,#fff 40%,#ffd6eb 80%,var(--pink));
  -webkit-background-clip:text;background-clip:text;color:transparent;}
.stats{margin-top:10px;display:flex;gap:14px;}
.stat{font-size:11px;color:var(--gray);}
.stat b{color:var(--white);font-weight:700;}

/* STICKY FILTERS */
.filters{
  position:sticky;top:0;z-index:10;
  background:rgba(12,15,40,.95);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  padding:10px 16px 12px;
}
.search-wrap{position:relative;margin-bottom:10px;}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--gray);pointer-events:none;}
#search{
  width:100%;background:var(--navy-2);border:1px solid var(--border);border-radius:10px;
  color:var(--white);font-family:'Outfit',sans-serif;font-size:14px;
  padding:10px 12px 10px 36px;outline:none;transition:.15s;
}
#search:focus{border-color:var(--pink);}
#search::placeholder{color:var(--gray);}

.filter-group{margin-bottom:8px;}
.filter-label{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);font-weight:700;margin-bottom:5px;}
.chip-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.chip-row::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0;border:1px solid var(--border);background:var(--navy-2);color:var(--gray);
  font-size:11.5px;font-weight:600;padding:6px 11px;border-radius:999px;cursor:pointer;
  white-space:nowrap;font-family:'Outfit',sans-serif;transition:.13s;
}
.chip:hover{border-color:var(--silver);color:var(--white);}
.chip.active.ax{background:var(--pink);border-color:var(--pink);color:#fff;}
.chip.active.xc{background:var(--blue);border-color:var(--blue);color:#fff;}
.chip.active.all{background:linear-gradient(90deg,var(--pink),var(--blue));border-color:transparent;color:#fff;}
.chip.active.nat{background:var(--navy-3);border-color:var(--silver);color:var(--white);}

/* RESULTS */
.results-meta{padding:10px 16px 6px;font-size:11px;color:var(--gray);}
.results-meta b{color:var(--white);}

/* SECTION */
.section{padding:0 16px;margin-bottom:24px;}
.section-head{
  display:flex;align-items:center;gap:10px;margin:16px 0 10px;
}
.section-badge{
  font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  padding:4px 10px;border-radius:999px;white-space:nowrap;
}
.section-badge.ax{background:rgba(231,38,129,.15);color:var(--pink);border:1px solid var(--pink-line);}
.section-badge.xc{background:rgba(0,135,204,.15);color:var(--blue);border:1px solid var(--blue-line);}
.section-line{flex:1;height:1px;background:var(--border-soft);}
.section-count{font-size:11px;color:var(--gray);font-weight:600;}

/* GRILLE PILOTES */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* CARTE PILOTE */
.card{
  background:var(--navy-2);border:1px solid var(--border-soft);
  border-radius:12px;padding:12px 11px 10px;
  position:relative;overflow:hidden;
  transition:transform .13s ease,border-color .13s ease;
  display:flex;flex-direction:column;gap:5px;
}
.card:hover{transform:translateY(-2px);}
.card.ax{border-color:rgba(231,38,129,.2);}
.card.xc{border-color:rgba(0,135,204,.2);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.card.ax::before{background:linear-gradient(90deg,var(--pink),transparent);}
.card.xc::before{background:linear-gradient(90deg,var(--blue),transparent);}

.card-top{display:flex;align-items:center;justify-content:space-between;}
.dossard{
  font-family:'Anton',sans-serif;font-size:22px;font-weight:400;letter-spacing:.02em;line-height:1;
}
.card.ax .dossard{color:var(--pink);}
.card.xc .dossard{color:var(--blue);}


.name{
  font-size:12px;font-weight:700;color:var(--white);line-height:1.25;
  word-break:break-word;
}
.card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:2px;}
.cat-tag{
  font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  padding:2px 6px;border-radius:5px;
}
.card.ax .cat-tag{background:var(--pink-soft);color:var(--pink);}
.card.xc .cat-tag{background:var(--blue-soft);color:var(--blue);}
.emplacement{
  font-size:10.5px;font-weight:800;letter-spacing:.04em;
  color:#f0a500;background:rgba(240,165,0,.12);
  border:1px solid rgba(240,165,0,.35);
  border-radius:6px;padding:2px 7px;
  display:flex;align-items:center;gap:4px;
}
.emp-dot{width:6px;height:6px;border-radius:50%;background:#f0a500;flex-shrink:0;}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--gray);}
.empty b{display:block;font-size:16px;color:var(--silver);margin-bottom:6px;}


.flag-img{vertical-align:middle;border-radius:2px;box-shadow:0 0 0 1px rgba(255,255,255,.15);}
.card-flag{width:20px;height:15px;flex-shrink:0;}
.nat-code{font-size:11px;font-weight:700;color:var(--gray);}

footer{text-align:center;padding:24px 16px 36px;border-top:1px solid var(--border-soft);font-size:11px;color:var(--gray);margin-top:8px;}
footer b{color:var(--silver);}
</style>
</head>

var D = JSON.parse(document.getElementById('d-pilotes').textContent);
var PILOTES = D.pilotes;
var CAT_ORDER = ['jxc','xc','jax','b16','sbx'];
var CAT_LABELS = {'jxc':'AX Junior CrossCar','xc':'XC Cross Car','jax':'AX Junior Buggy','b16':'Buggy 1600','sbx':'Super Buggy'};
var CAT_FAM = {'jxc':'xc','xc':'xc','jax':'ax','b16':'ax','sbx':'ax'};
var CAT_SHORT = {'jxc':'Jr XCar','xc':'XCar','jax':'Jr Buggy','b16':'Buggy 1600','sbx':'Super Buggy'};

var state = {cat:'all', nat:'all', q:''};

function renderChips(rowId, key) {
  document.getElementById(rowId).querySelectorAll('.chip').forEach(function(btn) {
    var val = btn.dataset[key];
    var active = state[key] === val;
    btn.classList.toggle('active', active);
    if(active) {
      var fam = btn.dataset.fam || (key==='nat' ? 'nat' : 'all');
      btn.className = 'chip' + (active ? ' active ' + fam : '');
    } else {
      btn.className = 'chip';
    }
  });
}

function filtered() {
  return PILOTES.filter(function(p) {
    if(state.cat !== 'all' && p.cat !== state.cat) return false;
    if(state.nat !== 'all' && p.nat !== state.nat) return false;
    if(state.q) {
      var q = state.q.toLowerCase();
      var inName = p.name.toLowerCase().indexOf(q) !== -1;
      var inNum = p.num.toLowerCase().indexOf(q) !== -1;
      if(!inName && !inNum) return false;
    }
    return true;
  });
}

function render() {
  renderChips('row-cat', 'cat');
  renderChips('row-nat', 'nat');
  var list = document.getElementById('list');
  var meta = document.getElementById('results-meta');
  var results = filtered();

  if(results.length === 0) {
    meta.innerHTML = '';
    list.innerHTML = '<div class="empty"><b>Aucun pilote trouv&eacute;</b>Essayez d&rsquo;autres filtres</div>';
    return;
  }
  meta.innerHTML = '<b>' + results.length + '</b> pilote' + (results.length > 1 ? 's' : '') + ' affich&eacute;' + (results.length > 1 ? 's' : '');

  var html = '';
  CAT_ORDER.forEach(function(cid) {
    var inCat = results.filter(function(p) { return p.cat === cid; });
    if(!inCat.length) return;
    var fam = CAT_FAM[cid];
    html += '<div class="section">';
    html += '<div class="section-head">';
    html += '<span class="section-badge ' + fam + '">' + CAT_LABELS[cid] + '</span>';
    html += '<span class="section-line"></span>';
    html += '<span class="section-count">' + inCat.length + '</span>';
    html += '</div>';
    html += '<div class="grid">';
    inCat.forEach(function(p) {
      var emp = p.emp ? '<span class="emplacement"><span class="emp-dot"></span>Paddock&nbsp;' + p.emp + '</span>' : '';
      html += '<div class="card ' + fam + '">';
      html += '<div class="card-top">';
      html += '<span class="dossard">#' + p.num + '</span>';
      html += (FLAGS_B64[p.nat] ? '<img class="flag-img card-flag" src="' + FLAGS_B64[p.nat] + '" alt="' + p.nat + '">' : '<span class="nat-code">' + p.nat + '</span>');
      html += '</div>';
      html += '<div class="name">' + p.name + '</div>';
      html += '<div class="card-bottom">';
      html += '<span class="cat-tag">' + CAT_SHORT[p.cat] + '</span>';
      html += emp;
      html += '</div>';
      html += '</div>';
    });
    html += '</div></div>';
  });
  list.innerHTML = html;
}

// Events
document.getElementById('search').addEventListener('input', function() {
  state.q = this.value.trim();
  render();
});
document.getElementById('row-cat').addEventListener('click', function(e) {
  var btn = e.target.closest('.chip');
  if(!btn) return;
  state.cat = state.cat === btn.dataset.cat ? 'all' : btn.dataset.cat;
  render();
});
document.getElementById('row-nat').addEventListener('click', function(e) {

  if(!btn) return;
  state.nat = state.nat === btn.dataset.nat ? 'all' : btn.dataset.nat;

});

</script>
